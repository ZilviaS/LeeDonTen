<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
        <style>
        body{
            margin:0;
            font-family:Arial, Helvetica, sans-serif;
            background:#f5f5f5;

            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .card{
            background:white;
            padding:30px;
            border-radius:12px;
            box-shadow:0 5px 20px rgba(0,0,0,.15);
            width:350px;
            text-align:center;
        }

        h2{
            margin-top:0;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:10px;
            border:none;
            border-radius:8px;
            cursor:pointer;
            font-size:16px;
        }

        .success{
            background:#28a745;
            color:white;
        }

        .fail{
            background:#dc3545;
            color:white;
        }
    </style>
</head>
<body>
    <div class="card">
        <p>Wanna Pay?</p>
        <div>
            <button onclick="pay()">Yes</button>
            <button onclick="cancelPayment()">No</button>
        </div>
        
    </div>
    <script>
        const paymentReference =
            window.location.pathname.split("/").pop();

        async function pay(){
            document.querySelectorAll("button").forEach(b => b.disabled = true);

            const res = await fetch("/pay-success",{
                method:'POST',
                headers : {
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({
                    paymentReference
                })
            })
            console.log(await res.json())
        }

        async function cancelPayment(){
            document.querySelectorAll("button").forEach(b => b.disabled = true);
            
            await fetch("/pay-fail",{
                method:'POST',
                headers : {
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({
                    paymentReference
                })
            })
        }

    </script>
</body>
</html>
